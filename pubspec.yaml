  firebase_storage: ^12.0.0
  connectivity_plus: ^6.1.0
  path_provider: ^2.1.4
  hive_flutter: ^1.1.0
  uuid: ^4.5.1
  intl: ^0.19.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.14.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
